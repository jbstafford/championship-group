<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Championship Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cds-blue-60: #0f62fe;
      --cds-blue-70: #0043ce;
      --cds-blue-80: #002d9c;
      --cds-gray-10: #f4f4f4;
      --cds-gray-30: #c6c6c6;
      --cds-gray-50: #8d8d8d;
      --cds-gray-60: #6f6f6f;
      --cds-gray-70: #525252;
      --cds-gray-80: #393939;
      --cds-gray-90: #262626;
      --cds-gray-100: #161616;
      --cds-background: #000000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cds-background);
      color: var(--cds-gray-30);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(15, 98, 254, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 98, 254, 0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeIn 1.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pictogram {
      width: 80px;
      height: 80px;
      margin-bottom: 40px;
      opacity: 0;
      animation: pictoReveal 0.8s ease-out 0.3s forwards;
    }

    @keyframes pictoReveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pictogram svg {
      width: 100%;
      height: 100%;
      fill: var(--cds-blue-60);
    }

    .title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 28px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--cds-gray-10);
      text-align: center;
      line-height: 1.2;
      opacity: 0;
      animation: textReveal 0.8s ease-out 0.6s forwards;
    }

    @keyframes textReveal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--cds-gray-50);
      text-align: center;
      margin-top: 12px;
      opacity: 0;
      animation: textReveal 0.8s ease-out 0.9s forwards;
    }

    /* Accent line */
    .rule {
      width: 32px;
      height: 1px;
      background: var(--cds-blue-60);
      margin-top: 32px;
      opacity: 0;
      animation: ruleReveal 0.6s ease-out 1.2s forwards;
    }

    @keyframes ruleReveal {
      from { opacity: 0; width: 0; }
      to { opacity: 0.6; width: 32px; }
    }

    @media (min-width: 480px) {
      .pictogram { width: 96px; height: 96px; margin-bottom: 48px; }
      .title { font-size: 34px; letter-spacing: 2px; }
      .subtitle { font-size: 14px; letter-spacing: 5px; }
    }
  </style>
</head>
<body>

  <div class="content">
    <div class="pictogram">

    </div>
    <div class="title">Championship Group</div>
    <div class="subtitle">Manhattan</div>

  </div>

</body>
</html>
